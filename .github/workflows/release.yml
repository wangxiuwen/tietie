name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }} / ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libgtk-3-dev

      - name: Install npm deps
        run: npm ci

      # Self-signed code-signing cert needs trust marking (Apple Dev IDs don't,
      # since they chain to Apple's pre-trusted roots). tauri-action's built-in
      # APPLE_CERTIFICATE import skips trust → codesign can't find the identity.
      # So we do it manually here, then let tauri-action just consume the identity.
      - name: Import self-signed code signing identity
        if: startsWith(matrix.platform, 'macos')
        env:
          CERT_B64: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          # macOS runner ships LibreSSL (no -legacy flag, not needed for legacy p12)
          openssl pkcs12 -in /tmp/cert.p12 -clcerts -nokeys \
            -out /tmp/cert.pem -passin pass:"$CERT_PWD"

          KEYCHAIN_PATH=/tmp/build.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Prepend our keychain to the user search list
          EXISTING=$(security list-keychains -d user | tr -d '"' | xargs)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          # Admin-domain trust requires root → CI runner has passwordless sudo
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain /tmp/cert.pem

          security find-identity -v -p codesigning

      - name: Build & bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "贴贴 ${{ github.ref_name }}"
          releaseBody: |
            自动构建产物 — Windows / macOS (Intel + Apple Silicon) / Linux (deb + AppImage)。

            支持 in-app OTA 升级:打开设置 → 检查更新。

            **macOS 用户**:第一次打开请到「系统设置 → 隐私与安全」允许运行(自签名)。
            **Linux 用户**:deb 适用于 Ubuntu/Debian;AppImage 直接 chmod +x 后运行。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
